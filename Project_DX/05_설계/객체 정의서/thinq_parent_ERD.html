let currentDomain = 'core';

function showDomain(d) {
  currentDomain = d;
  document.querySelectorAll('.domain-btn').forEach(b => b.classList.remove('active'));
  if(event && event.target) event.target.classList.add('active');
  render();
}

function entCenter(e) { return { x: e.x + EW/2, y: e.y + EH/2 }; }

function attrPositions(ent) {
  const attrs = ent.attrs || [];
  const n = attrs.length;
  if (n === 0) return [];
  const cx = ent.x + EW/2;
  const cy = ent.y + EH/2;
  const positions = [];
  const topCount = Math.ceil(n / 2);
  const botCount = n - topCount;
  const hSpacing = 82;

  for (let i = 0; i < topCount; i++) {
    const startX = cx - (topCount - 1) * hSpacing / 2;
    positions.push({ ...attrs[i], ax: startX + i * hSpacing, ay: ent.y - 50 });
  }
  for (let i = 0; i < botCount; i++) {
    const startX = cx - (botCount - 1) * hSpacing / 2;
    positions.push({ ...attrs[topCount + i], ax: startX + i * hSpacing, ay: ent.y + EH + 50 });
  }
  return positions;
}

function renderDomain(dom, compact) {
  const s = compact ? 0.5 : 1;
  const ew = EW * s, eh = EH * s;
  const dw = DW * s, dh = DH * s;
  let lines = '';
  let shapes = '';

  const entMap = {};
  dom.entities.forEach(e => { entMap[e.id] = e; });

  dom.relations.forEach(rel => {
    const fe = entMap[rel.from], te = entMap[rel.to];
    if (!fe || !te) return;
    const fc = { x: (fe.x + EW/2)*s, y: (fe.y + EH/2)*s };
    const tc = { x: (te.x + EW/2)*s, y: (te.y + EH/2)*s };
    const mx = (fc.x + tc.x) / 2, my = (fc.y + tc.y) / 2;

    lines += `<line x1="${fc.x}" y1="${fc.y}" x2="${mx}" y2="${my}" stroke="${dom.stroke}" stroke-width="${compact?0.6:0.8}" opacity="0.5"/>`;
    lines += `<line x1="${mx}" y1="${my}" x2="${tc.x}" y2="${tc.y}" stroke="${dom.stroke}" stroke-width="${compact?0.6:0.8}" opacity="0.5"/>`;

    if (!compact) {
      const cm1x = (fc.x+mx)/2, cm1y = (fc.y+my)/2;
      const cm2x = (mx+tc.x)/2, cm2y = (my+tc.y)/2;
      shapes += `<text x="${cm1x}" y="${cm1y-8}" text-anchor="middle" font-size="10" font-weight="500" fill="${dom.stroke}">${rel.c1}</text>`;
      shapes += `<text x="${cm2x}" y="${cm2y-8}" text-anchor="middle" font-size="10" font-weight="500" fill="${dom.stroke}">${rel.c2}</text>`;
    }

    const pts = `${mx},${my-dh/2} ${mx+dw/2},${my} ${mx},${my+dh/2} ${mx-dw/2},${my}`;
    shapes += `<polygon points="${pts}" fill="#FAEEDA" stroke="#854F0B" stroke-width="${compact?0.5:0.8}"/>`;
    shapes += `<text x="${mx}" y="${my+1}" text-anchor="middle" dominant-baseline="central" font-size="${compact?7:10.5}" fill="#412402">${rel.name}</text>`;
  });

  dom.entities.forEach(ent => {
    const ex = ent.x * s, ey = ent.y * s;
    const fillC = ent.ref ? '#F1EFE8' : dom.color;
    const strokeC = ent.ref ? '#5F5E5A' : dom.stroke;

    if (!compact) {
      const aps = attrPositions(ent);
      aps.forEach(a => {
        const arx = Math.max(a.n.length * 3.8 + 12, 34);
        lines += `<line x1="${a.ax}" y1="${a.ay}" x2="${ent.x + EW/2}" y2="${a.ay < ent.y ? ent.y : ent.y + EH}" stroke="#3B6D11" stroke-width="0.5" opacity="0.4"/>`;
        shapes += `<ellipse cx="${a.ax}" cy="${a.ay}" rx="${arx}" ry="${ARY}" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.6"/>`;
        if (a.pk) shapes += `<line x1="${a.ax - arx + 5}" y1="${a.ay + ARY - 2}" x2="${a.ax + arx - 5}" y2="${a.ay + ARY - 2}" stroke="#3B6D11" stroke-width="0.7"/>`;
        shapes += `<text x="${a.ax}" y="${a.ay + 1}" text-anchor="middle" dominant-baseline="central" font-size="9.5" fill="#173404">${a.n}</text>`;
      });
    }

    shapes += `<rect x="${ex}" y="${ey}" width="${ew}" height="${eh}" rx="${compact?3:5}" fill="${fillC}" stroke="${strokeC}" stroke-width="${compact?0.8:1.2}"/>`;
    shapes += `<text x="${ex+ew/2}" y="${ey+eh/2+1}" text-anchor="middle" dominant-baseline="central" font-size="${compact?8:12}" font-weight="500" fill="${strokeC}">${ent.id}</text>`;
  });

  return lines + shapes;
}

function render() {
  const container = document.getElementById('erd-container');
  if (currentDomain === 'all') { renderAll(container); return; }
  const dom = domains[currentDomain];
  let svg = `<svg width="100%" viewBox="0 0 ${dom.w} ${dom.h}" xmlns="http://www.w3.org/2000/svg" style="font-family:'Anthropic Sans',sans-serif">`;
  svg += renderDomain(dom, false);
  svg += `</svg>`;
  container.innerHTML = svg;
}

function renderAll(container) {
  const keys = Object.keys(domains);
  let html = '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(min(380px,100%),1fr));gap:12px;">';
  keys.forEach((k,i) => {
    const dom = domains[k];
    const titles = {core:"핵심",diary:"임신일기",todo:"할일",mombti:"맘BTI",community:"커뮤니티",schedule:"일정/응원",appliance:"가전제어",ai:"AI"};
    let svg = `<svg width="100%" viewBox="0 0 ${dom.w*0.5} ${dom.h*0.5}" xmlns="http://www.w3.org/2000/svg" style="font-family:'Anthropic Sans',sans-serif">`;
    svg += `<text x="8" y="14" font-size="11" font-weight="500" fill="${dom.stroke}">${titles[k]}</text>`;
    svg += renderDomain(dom, true);
    svg += `</svg>`;
    html += `<div style="background:var(--color-background-secondary);border-radius:var(--border-radius-lg);padding:8px;cursor:pointer" onclick="document.querySelectorAll('.domain-btn')[${i}].click()">${svg}</div>`;
  });
  html += '</div>';
  container.innerHTML = html;
}

render();
</script>
